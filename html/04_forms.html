<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h2>Login Forms</h2>
    <form >
        <label for="email">
            Email:
            <input placeholder="Enter email" type="text" name="email" id="">
        </label>
        <label for="password">
            Password:
            <input placeholder="Enter Password" type="password" name="password" id="">
        </label>
        <button type="submit">login</button>
        <button type="reset">reset</button>
    </form>
    <div>
        <form>
           <label for="story">Tell us your story:</label>
             <textarea id="story" name="story" rows="5" cols="33">It was a dark and stormy night...
             </textarea>
            <label for="Games">
                Basketball:<input type="checkbox" name="" id="">
            </label>
            <label for="Games">
                Pickelball:<input type="radio" name="" id="">
            </label>
            <label for="Games">
                <select name="Games" id="">
                    <option value="Cricket">Cricket</option>
                    <option value="Baseball">Baseball</option>
                    <option value="Hockey">hockey</option>
                </select>
            </label>
            <label for="month">
                <input type="month" name="" id="">
                <input type="color">
            </label>
            <button type="submit">submit</button>
            <progress id="progress" value="70" max="100"></progress>
            <!-- Label text for the progress bar -->
<label for="progress">Progress: 70%</label>

<!-- Line break to move progress bar to the next line -->
<br>

<!-- Progress bar element -->
<!-- id="progress" connects it with the label -->
<!-- value="70" means 70 units are completed -->
<!-- max="100" means total work is 100 units -->
<progress id="progress" value="70" max="100"></progress>

        </form>
    </div>
</body>
